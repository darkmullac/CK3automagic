 auto_build.1001.t:0 "Building Auto-Upgrade"
 auto_build.1001.setting.desc:0 "My diligent envoy has gathered all the nearby architects and their assistants, and they are now drafting a plan for the construction in the domain.\n\nA young man steps forward briskly and unfolds a piece of paper for me, '[ROOT.Char.GetLadyLord], here is the current construction plan, please make your decision.'\n\nI look down at the paper the young man presents:\n\n"
 auto_build.1001.switch.desc:0 "#T Scope of Construction:#!"
 auto_build.1001.root.desc:0 "#S My domain barony#!\n"
 auto_build.1001.county.desc:0 "#S My domain county##!\n"
 auto_build.1001.vassal.desc:0 "#S All my realm#!\n"
 auto_build.1001.off.desc:0 "#S #N Not enabled#!#!\n"
 auto_build.1001.budget.desc:0 "#T Construction Budget:#!"
 auto_build.1001.gold_10k.desc:0 "#S Retain 10000 [gold_i]#! "
 auto_build.1001.gold_5k.desc:0 "#S Retain 5000 [gold_i]#! "
 auto_build.1001.gold_2k.desc:0 "#S Retain 2000 [gold_i]#! "
 auto_build.1001.gold_all.desc:0 "#S Use all [gold_i]#! "
 auto_build.1001.prestige_10k.desc:0 "#S Retain 10000 [prestige_i]#!"
 auto_build.1001.prestige_5k.desc:0 "#S Retain 5000 [prestige_i]#!"
 auto_build.1001.prestige_2k.desc:0 "#S Retain 2000 [prestige_i]#!"
 auto_build.1001.prestige_all.desc:0 "#S Use all [prestige_i]#!"
 auto_build.1001.budget_end.desc:0 "\n"
 auto_build.1001.cooldown.desc:0 "#T Construction Period:#!"
 auto_build.1001.cooldown_0.desc:0 "#S About half a month#!\n"
 auto_build.1001.cooldown_1.desc:0 "#S About one month#!\n"
 auto_build.1001.cooldown_2.desc:0 "#S About three months#!\n"
 auto_build.1001.cooldown_3.desc:0 "#S About six months#!\n"
 auto_build.1001.a:0 "Adjust the scope of construction"
 auto_build.1001.b:0 "Adjust the construction budget"
 auto_build.1001.c:0 "Adjust the construction period"
 auto_build.1001.out:0 "Execute it as planned."
 auto_build.1020.t:0 "Building Auto-Upgrade: Scope of Construction"
 auto_build.1020.desc:0 "Generally, the architects will only work within my directly controlled domains, but I can also have them carry out construction across all my domains, although that might not be very beneficial to my treasury.\n\nThe young assistant architect standing before me seems a bit nervous in the presence of his liege, eagerly awaiting my response."
 auto_build.1020.a:0 "Only within my direct holdings."
 auto_build.1020.b:0 "Start construction in my domain county."
 auto_build.1020.c:0 "Carry out construction across all my realm."
 auto_build.1020.d:0 "I've changed my mind, cancel the construction plan."
 auto_build.1020.back:0 "No, this isn't what I wanted to discuss."

 auto_build.1030.t:0 "Building Auto-Upgrade: Construction Budget"
 auto_build.1030.desc:0 "I frown. Budget, the most troublesome topic.\n\nClearly, I cannot hand over all the gold to these architects, but if I don't give them enough budget, the expansion project might end in failure."
 auto_build.1030.a:0 "How much gold do I have left?"
 auto_build.1030.b:0 "How much prestige do I have left?"
 auto_build.1030.back:0 "Now let me look at other choice..."

 auto_build.1031.t:0 "Building Auto-Upgrade: Construction Budget"
 auto_build.1031.desc:0 "I frown. Budget, the most troublesome topic.\n\nClearly, I cannot hand over all the gold to these architects, but if I don't give them enough budget, the expansion project might end in failure."
 auto_build.1031.a:0 "Retain 10,000 gold"
 auto_build.1031.b:0 "Retain 5,000 gold"
 auto_build.1031.c:0 "Retain 2,000 gold"
 auto_build.1031.d:0 "Use all for construction"
 auto_build.1031.back:0 "$auto_build.1030.back$"

 auto_build.1032.t:0 "Building Auto-Upgrade: Construction Budget"
 auto_build.1032.desc:0 "I frown. Budget, the most troublesome topic.\n\nClearly, I cannot hand over all the gold to these architects, but if I don't give them enough budget, the expansion project might end in failure."
 auto_build.1032.a:0 "Retain 10,000 prestige"
 auto_build.1032.b:0 "Retain 5,000 prestige"
 auto_build.1032.c:0 "Retain 2,000 prestige"
 auto_build.1032.d:0 "Use all for construction"
 auto_build.1032.back:0 "$auto_build.1030.back$"

 auto_build.1040.t:0 "Building Auto-Upgrade: Construction Period"
 auto_build.1040.desc:0 "'[ROOT.Char.GetLadyLord], we can continue to complete the expansion project if we maintain the current scale,' the young man in front of me seems a bit nervous, 'but you can also decide the construction period yourself, the choice is yours, [ROOT.Char.GetLadyLord].'"
 auto_build.1040.a:0 "Every half month"
 auto_build.1040.b:0 "Every month"
 auto_build.1040.c:0 "Every three months"
 auto_build.1040.d:0 "Every six months"
 auto_build.1040.back:0 "$auto_build.1020.back$"# 修正
